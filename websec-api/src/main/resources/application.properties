spring.application.name=web-security

spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://localhost:3308/websec?useSSL=false&useTimezone=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=rootpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=20

spring.codec.max-in-memory-size=30MB
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.jpa.show-sql=true
management.server.port=8088
management.endpoints.access.default=read_only
server.port=8088
spring.web.error.include-message=always
spring.jackson.default-property-inclusion=non_null

springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

management.endpoints.web.exposure.include=*
management.endpoint.mappings.enabled=true

websec.jwt-secret=qyz9dgGxtfp28GN5mSpgGydyjMFVCg8LOqwrn+mnYvI=

websec.cors.allowed.origins=*
websec.cors.allowed.protocols=OPTIONS,HEAD,GET,PATCH,POST,PUT,DELETE
websec.cors.allowed.headers=*
websec.cors.exposed.headers=*

logging.level.org.apache.coyote.http11=DEBUG
logging.level.org.apache.tomcat.util.net.NioEndpoint=DEBUG
logging.pattern.console=%d{HH:mm:ss} %-5level %logger - %msg%n